<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ghostfaccee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #2c001e;
            color: #d4d4d4;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 16px;
        }

        .terminal {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            background: #300a24;
            border: 1px solid #5e2750;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: #1a0a15;
            padding: 10px 16px;
            border-bottom: 1px solid #5e2750;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            min-height: 44px;
        }

        .terminal-dots {
            display: flex;
            gap: 8px;
            position: absolute;
            right: 16px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            background: #5e2750;
        }

        .terminal-title {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 400;
            text-align: center;
            white-space: nowrap;
        }

        .terminal-title .user,
        .terminal-title .at,
        .terminal-title .host {
            color: #4caf50;
            font-weight: 700;
        }

        .terminal-body {
            padding: 20px 24px 16px 24px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            font-size: 15px;
            line-height: 1.7;
            -webkit-overflow-scrolling: touch;
        }

        .line {
            margin-bottom: 2px;
            line-height: 1.7;
            flex-shrink: 0;
            display: none;
            font-size: inherit;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .line.visible {
            display: block;
        }

        .prompt {
            color: #d4d4d4;
            font-size: inherit;
        }

        .prompt-user,
        .prompt-at,
        .prompt-host {
            color: #4caf50;
            font-weight: 700;
        }

        .prompt-path {
            color: #ffffff;
        }

        .prompt-symbol {
            color: #d4d4d4;
            margin-right: 6px;
        }

        .command {
            color: #d4d4d4;
            font-weight: 700;
            font-size: inherit;
        }

        .command-arg {
            color: #ffffff;
            font-weight: 400;
        }

        .command-str {
            color: #4caf50;
            font-weight: 700;
        }

        .output {
            color: #b0a0aa;
            padding-left: 16px;
            margin: 1px 0 3px 0;
            line-height: 1.7;
            font-size: inherit;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .output-highlight {
            color: #ffffff;
            font-weight: 700;
        }

        .output-green {
            color: #4caf50;
            font-weight: 700;
        }

        .output-muted {
            color: #7a6a74;
        }

        .output-white {
            color: #ffffff;
        }

        .output a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            word-break: break-all;
        }

        .output a:hover {
            text-decoration: underline;
        }

        .cursor-blink {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #ffffff;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 4px;
        }

        .cursor-blink.hidden {
            display: none;
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .terminal-header {
                padding: 8px 12px;
                min-height: 38px;
            }

            .terminal-title {
                font-size: 0.75rem;
            }

            .dot {
                width: 12px;
                height: 12px;
            }

            .terminal-dots {
                gap: 6px;
                right: 12px;
            }

            .terminal-body {
                padding: 14px 16px 12px 16px;
                font-size: 14px;
            }

            .prompt {
                font-size: inherit;
            }

            .output {
                padding-left: 12px;
                font-size: inherit;
            }

            .cursor-blink {
                width: 9px;
                height: 18px;
            }

            .line {
                font-size: inherit;
                line-height: 1.6;
            }
        }

        @media (max-width: 480px) {
            .terminal-header {
                padding: 6px 10px;
                min-height: 34px;
            }

            .terminal-title {
                font-size: 0.65rem;
            }

            .dot {
                width: 10px;
                height: 10px;
            }

            .terminal-dots {
                gap: 5px;
                right: 10px;
            }

            .terminal-body {
                padding: 10px 12px 8px 12px;
                font-size: 13px;
            }

            .prompt {
                font-size: inherit;
            }

            .output {
                padding-left: 8px;
                font-size: inherit;
            }

            .line {
                font-size: inherit;
                line-height: 1.5;
                margin-bottom: 1px;
            }

            .cursor-blink {
                width: 8px;
                height: 16px;
            }
        }

        @media (max-width: 360px) {
            .terminal-body {
                font-size: 11px;
                padding: 8px 8px 6px 8px;
            }

            .terminal-title {
                font-size: 0.55rem;
            }

            .output {
                padding-left: 6px;
            }

            .cursor-blink {
                width: 7px;
                height: 14px;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            background: #300a24;
        }
        ::-webkit-scrollbar-thumb {
            background: #5e2750;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7a3a6a;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-title">
                <span class="user">ghostfaccee@ghostfaccee-ln: ~</span>
            </div>
            <div class="terminal-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <div class="terminal-body" id="terminalBody">
        </div>
    </div>

    <script>
        const commands = [{
            cmd: 'whoami',
            output: '<span class="output-highlight">ghostfaccee</span> <span class="output-muted"> // backend developer, student</span>'
        }, {
            cmd: 'cat about.txt',
            output: '<span class="output-muted">Develop APIs, bots, and services.</span><br /><span class="output-muted">Use and study Docker, Redis, Postgres, FastAPI, and Django.</span><br /><span class="output-muted">I am looking for internships and interesting projects.</span>'
        }, {
            cmd: 'cat contacts.txt',
            output: '<span class="output-white">email</span>     <span class="output-muted">→</span> <a href="mailto:ghostface.host@gmail.com">ghostface.host@gmail.com</a><br/><span class="output-white">github</span>    <span class="output-muted">→</span> <a href="https://github.com/ghostfaccee" target="_blank">github.com/ghostfaccee</a>'
        }, {
            cmd: 'cat skills.txt',
            output: '<span class="output-white">[FastAPI, Django, PostgreSQL, Docker, Redis]</span>'
        }, {
            cmd: 'echo "Open for collaboration"',
            output: '<span class="output-green">● Open for collaboration</span> <span class="output-muted"> // available for cooperation</span>'
        }, {
            cmd: './ --version',
            output: '<span class="output-muted">ghostfaccee v1.43.5</span>'
        }];

        const terminalBody = document.getElementById('terminalBody');
        let commandIndex = 0;

        function createPromptLine() {
            const line = document.createElement('div');
            line.className = 'line visible';
            line.innerHTML = `
                <span class="prompt">
                    <span class="prompt-user">ghostfaccee@ghostfaccee-ln:~$</span>
                </span>
                <span class="command" id="cmdText"></span>
                <span class="cursor-blink" id="cmdCursor"></span>
            `;
            terminalBody.appendChild(line);
            return line;
        }

        function createOutputLine(html) {
            const line = document.createElement('div');
            line.className = 'line visible';
            line.innerHTML = `<div class="output">${html}</div>`;
            terminalBody.appendChild(line);
            return line;
        }

        function createFinalPrompt() {
            const line = document.createElement('div');
            line.className = 'line visible';
            line.innerHTML = `
                <span class="prompt">
                    <span class="prompt-user">ghostfaccee@ghostfaccee-ln:~$</span>
                </span>
                <span class="cursor-blink" id="finalCursor"></span>
            `;
            terminalBody.appendChild(line);
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function typeCommand(line, command, callback) {
            const cmdText = line.querySelector('#cmdText');
            const cmdCursor = line.querySelector('#cmdCursor');
            let i = 0;

            function typeChar() {
                if (i < command.length) {
                    cmdText.textContent += command[i];
                    i++;
                    const delay = 40 + Math.random() * 50;
                    setTimeout(typeChar, delay);
                } else {
                    cmdCursor.classList.add('hidden');
                    setTimeout(callback, 250);
                }
            }
            typeChar();
        }

        function processNextCommand() {
            if (commandIndex >= commands.length) {
                createFinalPrompt();
                return;
            }

            const cmdData = commands[commandIndex];
            const promptLine = createPromptLine();

            typeCommand(promptLine, cmdData.cmd, function() {
                createOutputLine(cmdData.output);
                commandIndex++;

                const delay = 500 + Math.random() * 400;
                setTimeout(function() {
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                    processNextCommand();
                }, delay);
            });
        }

        setTimeout(function() {
            processNextCommand();
        }, 300);
    </script>
</body>
</html>
